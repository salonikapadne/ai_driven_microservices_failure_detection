version: '3.8'
services:
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3001:3001"
    restart: always

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3002:3002"
    restart: always

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "3003:3003"
    restart: always

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "3000:3000"
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  log-collector:
    build: ./log-collector
    container_name: log-collector
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - user-service
      - order-service
      - payment-service
      - gateway-service
      - rabbitmq
    restart: always

  ai-service:
    build: ./ai-service
    container_name: ai-service
    environment:
      - GEMINI_API_KEY=AIzaSyDi_mAX3i9Mut6I4ZgOR5tETG8NYmRgJ4s  
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4000:4000"
    depends_on:
      - rabbitmq
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - ai-service
    restart: always
